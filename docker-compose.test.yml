services:

  server:
    build:
      context: ./server
    container_name: speech-test-server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=test
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      args:
        - REACT_APP_API_URL=http://localhost:3001
    container_name: speech-test-client
    ports:
      - "3000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5

  cypress:
    image: cypress/included:13.9.0
    container_name: speech-test-cypress
    depends_on:
      client:
        condition: service_healthy
    working_dir: /e2e
    volumes:
      - ./cypress:/e2e/cypress
      - ./cypress.config.ts:/e2e/cypress.config.ts
      - ./package.json:/e2e/package.json
    environment:
      - CYPRESS_baseUrl=http://client:5000
    command: >
      cypress run
        --browser chrome
        --config baseUrl=http://client:5000,video=true,videosFolder=/e2e/cypress/videos
        --spec cypress/e2e/debug_mode.cy.js
    profiles:
      - test
