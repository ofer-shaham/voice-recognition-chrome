services:

  # ── OpenRouter proxy server ────────────────────────────────────────────────
  server:
    build:
      context: ./server
    container_name: speech-translation-server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React client ───────────────────────────────────────────────────────────
  client:
    build:
      context: .
      args:
        - REACT_APP_API_URL=http://localhost:3001
    container_name: speech-translation-client
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
