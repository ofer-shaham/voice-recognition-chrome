[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PUPPETEER_SKIP_DOWNLOAD = "true"
  CYPRESS_INSTALL_BINARY = "0"
  CI = "false"

[functions]
  node_bundler = "nft"

# Rewrite /api/* and /api-docs* to the serverless function.
# Classic Netlify Functions only respond at the exact base URL
# (/.netlify/functions/<name>), so DO NOT append any path suffix here.
# The function reads the original request path from event.rawUrl.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/api-docs*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
