[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# Rewrite /api/* to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
